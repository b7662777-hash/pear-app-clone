<!doctype html>
<html lang="en">
  <head>
    <!-- Preconnect hints MUST be first in head for maximum effect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://tlmgfyumjusewjecskkl.supabase.co" crossorigin>
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link rel="preconnect" href="https://cdn.gpteng.co" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://tlmgfyumjusewjecskkl.supabase.co">
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <link rel="dns-prefetch" href="https://cdn.gpteng.co">
    
    <!-- Async font loading - prevents render blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amonymous- Pear music</title>
    <meta name="description" content="Stream your favorite music, discover new artists, and create playlists. Your personal music streaming experience.">
    <meta name="author" content="Music App" />

    <!-- Critical CSS for initial render - prevents FOUC while main CSS loads -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-family: 'Inter', system-ui, sans-serif; }
      body { background: #000; color: #fff; min-height: 100vh; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; display: flex; background: #000; }
      .page-loader { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #888; }
      /* Critical layout structure */
      .flex { display: flex; }
      .flex-1 { flex: 1 1 0%; }
      .flex-col { flex-direction: column; }
      .h-screen { height: 100vh; }
      .overflow-hidden { overflow: hidden; }
      .relative { position: relative; }
      /* Sidebar critical styles */
      .w-64 { width: 16rem; }
      .bg-background { background-color: #000; }
      /* Scrollbar prevention during load */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    </style>
    
    <!-- Inline LCP preload from cache - must be synchronous for browser discovery -->
    <script>
      (function() {
        try {
          var cached = localStorage.getItem('recommended_tracks_cache');
          if (cached) {
            var entry = JSON.parse(cached);
            var now = Date.now();
            // Cache valid for 24 hours, featured track is at index 4
            if (now - entry.timestamp < 86400000 && entry.tracks && entry.tracks.length > 4 && entry.tracks[4].thumbnail) {
              var url = entry.tracks[4].thumbnail;
              // Apply optimizeImageUrl logic inline for Google images (size 200 for featured track)
              if (url.includes('googleusercontent.com')) {
                url = url.replace(/=[^?&]+$/, '=w200-h200-l40-rw');
                if (!url.includes('=w')) url += '=w200-h200-l40-rw';
              } else if (url.includes('i.ytimg.com')) {
                url = url.replace(/(hqdefault|maxresdefault|sddefault)/, 'mqdefault');
              }
              // Create preload link synchronously
              var link = document.createElement('link');
              link.rel = 'preload';
              link.as = 'image';
              link.href = url;
              link.setAttribute('fetchpriority', 'high');
              link.setAttribute('crossorigin', 'anonymous');
              document.head.appendChild(link);
            }
          }
        } catch (e) {}
      })();
    </script>
