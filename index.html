<!doctype html>
<html lang="en">
  <head>
    <!-- Preconnect hints (max 4) - most critical origins only -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://lh3.googleusercontent.com">
    <link rel="preconnect" href="https://cdn.gpteng.co" crossorigin>
    <!-- DNS prefetch for secondary origins -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://tlmgfyumjusewjecskkl.supabase.co">
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
    <link rel="dns-prefetch" href="https://cdn.gpteng.co">
    
    <!-- Async font loading - prevents render blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amonymous- Pear music</title>
    <meta name="description" content="Stream your favorite music, discover new artists, and create playlists. Your personal music streaming experience.">
    <meta name="author" content="Music App" />

    <!-- Critical CSS for initial render - prevents FOUC while main CSS loads -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-family: 'Inter', system-ui, sans-serif; }
      body { background: #000; color: #fff; min-height: 100vh; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; min-height: 100dvh; display: flex; background: #000; width: 100%; }
      .page-loader { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #888; }
      /* Critical layout structure */
      .flex { display: flex; }
      .flex-1 { flex: 1 1 0%; }
      .flex-col { flex-direction: column; }
      .h-screen { height: 100vh; }
      .overflow-hidden { overflow: hidden; }
      .relative { position: relative; }
      /* Sidebar critical styles */
      .w-64 { width: 16rem; }
      .bg-background { background-color: #000; }
      /* Scrollbar prevention during load */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    </style>
    
    <!-- Inline LCP preload from cache - uses document.write for true preload scanner discovery -->
    <script>
      (function() {
        try {
          var cached = localStorage.getItem('recommended_tracks_cache');
          if (cached) {
            var entry = JSON.parse(cached);
            var now = Date.now();
            // Cache valid for 24 hours
            if (now - entry.timestamp < 86400000 && entry.tracks && entry.tracks.length > 0) {
              // Helper to transform URL for optimal size
              function optimizeUrl(url, size) {
                if (!url) return null;
                if (url.indexOf('googleusercontent.com') !== -1) {
                  if (url.indexOf('=') !== -1) {
                    return url.replace(/=[^?&]+$/, '=w' + size + '-h' + size + '-l40-rw');
                  } else {
                    return url + '=w' + size + '-h' + size + '-l40-rw';
                  }
                } else if (url.indexOf('i.ytimg.com') !== -1) {
                  return url.replace(/(hqdefault|maxresdefault|sddefault)/, 'mqdefault');
                }
                return url;
              }
              
              // Desktop LCP: featured track at index 4 (200x200)
              if (entry.tracks.length > 4 && entry.tracks[4].thumbnail) {
                var desktopUrl = optimizeUrl(entry.tracks[4].thumbnail, 200);
                if (desktopUrl) {
                  document.write('<link rel="preload" as="image" href="' + desktopUrl + '" fetchpriority="high">');
                }
              }
              
              // Mobile LCP: first track at index 0 (160x160)
              if (entry.tracks[0] && entry.tracks[0].thumbnail) {
                var mobileUrl = optimizeUrl(entry.tracks[0].thumbnail, 160);
                if (mobileUrl) {
                  document.write('<link rel="preload" as="image" href="' + mobileUrl + '">');
                }
              }
            }
          }
        } catch (e) {}
      })();
    </script>
